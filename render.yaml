databases:
  - name: smartqueue_db
    databaseName: smartqueue
    user: smartqueue_user

services:
  - type: web
    name: smart-queue
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn smart_queue.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartqueue_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
