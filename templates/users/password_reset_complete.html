{% extends 'base.html' %}

{% block title %}Password Reset Successful{% endblock %}

{% block content %}
<div class="row justify-content-center animate__animated animate__fadeIn">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm border-0 animate__animated animate__zoomIn text-center">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
            </div>
            <h2 class="mb-2 animate__animated animate__slideInDown">Password Reset Success!</h2>
            <p class="text-muted mb-4 animate__animated animate__fadeIn">
                Your password has been successfully reset. You can now login with your new credentials.
            </p>
            <div class="d-grid mt-4">
                <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg shadow-sm">Login Now</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
