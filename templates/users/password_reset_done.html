{% extends 'base.html' %}

{% block title %}Reset Link Sent{% endblock %}

{% block content %}
<div class="row justify-content-center animate__animated animate__fadeIn">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm border-0 animate__animated animate__zoomIn text-center">
            <div class="mb-4">
                <i class="bi bi-envelope-check-fill text-success" style="font-size: 4rem;"></i>
            </div>
            <h2 class="mb-2 animate__animated animate__slideInDown">Reset Link Sent</h2>
            <p class="text-muted mb-4 animate__animated animate__fadeIn">
                If an account exists with the email you provided, you'll receive a password reset link shortly.
            </p>
            <p class="text-muted small">Please check your inbox and spam folder.</p>
            <div class="d-grid mt-4">
                <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg shadow-sm">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
