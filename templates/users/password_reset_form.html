{% extends 'base.html' %}
{% load widget_tweaks %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center animate__animated animate__fadeIn">
    <div class="col-md-5">
        <div class="card p-4 shadow-lg border-0 animate__animated animate__zoomIn">
            <h2 class="text-center mb-2 animate__animated animate__slideInDown">Reset Password</h2>
            <p class="text-center text-muted small mb-4 animate__animated animate__fadeIn">Enter your email address to receive a password reset link.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your registered email" required>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm">Send Reset OTP</button>
                </div>
            </form>
            <div class="mt-4 text-center">
                <p class="small"><a href="{% url 'users:login' %}" class="text-decoration-none">Back to Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
