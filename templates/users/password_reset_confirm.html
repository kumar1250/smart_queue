{% extends 'base.html' %}
{% load widget_tweaks %}

{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="row justify-content-center animate__animated animate__fadeIn">
    <div class="col-md-5">
        <div class="card p-4 shadow-lg border-0 animate__animated animate__zoomIn">
            <h2 class="text-center mb-2 animate__animated animate__slideInDown">Set New Password</h2>
            <p class="text-center text-muted small mb-4 animate__animated animate__fadeIn">Enter and confirm your new password below.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter new password" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm">Set New Password</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
