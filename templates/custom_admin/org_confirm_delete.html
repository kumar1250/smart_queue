{% extends 'base.html' %}

{% block title %}Delete Organization{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-body p-5 text-center">
                <div class="mb-4 text-danger">
                    <i class="bi bi-exclamation-triangle-fill fs-1"></i>
                </div>
                <h4 class="mb-3">Are you sure?</h4>
                <p class="text-muted mb-4">You are about to delete <strong>{{ object.name }}</strong>. All associated services and tokens will be permanently removed.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger py-2">
                            <i class="bi bi-trash me-2"></i>Delete Forever
                        </button>
                        <a href="{% url 'custom_admin:manage_organizations' %}" class="btn btn-outline-secondary py-2">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
